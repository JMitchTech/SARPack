# SARPack — alembic.ini
# Alembic migration configuration.
#
# Common commands:
#   alembic upgrade head          — apply all pending migrations (run on deploy)
#   alembic revision --autogenerate -m "description"  — generate a new migration
#   alembic downgrade -1          — roll back one migration
#   alembic history               — list all migrations
#   alembic current               — show current applied version
#
# Always run from the SARPack/ root directory.

[alembic]
script_location = migrations

# Database URL is pulled from the environment at runtime via migrations/env.py.
# Do not set sqlalchemy.url here — it would override the .env setting.
# sqlalchemy.url = (set via environment)

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
